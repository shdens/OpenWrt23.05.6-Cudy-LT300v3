name: OpenWrt Builder 23.05.6 Cudy LT300+vermagic

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v23.05.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        rm -rf openwrt
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Hard Patch Device Source
      run: |
        cd openwrt
        
        # Записываем исправленный DTS-код Cudy LT300 v3 поверх файла Альфы
        cat << 'EOF' > target/linux/ramips/dts/mt7628an_alfa-network_awusfree1.dts
        // SPDX-License-Identifier: GPL-2.0-or-later OR MIT
        
        #include "mt7628an.dtsi"
        
        #include <dt-bindings/gpio/gpio.h>
        #include <dt-bindings/input/input.h>
        #include <dt-bindings/leds/common.h>
        
        / {
        	compatible = "cudy,lt300-v3", "mediatek,mt7628an-soc";
        	model = "Cudy LT300 v3";
        
        	aliases {
        		led-boot = &white_status;
        		led-running = &white_status;
        		led-failsafe = &red_status;
        		led-upgrade = &red_status;
        		label-mac-device = &ethernet;
        	};
        
        	chosen {
        		bootargs = "console=ttyS0,115200";
        	};
        
        	gpio-keys {
        		compatible = "gpio-keys";
        
        		reset {
        			label = "reset";
        			linux,code = <KEY_RESTART>;
        			gpios = <&gpio 38 GPIO_ACTIVE_LOW>;
        		};
        
        		wps {
        			label = "wps";
        			gpios = <&gpio 5 GPIO_ACTIVE_LOW>;
        			linux,code = <KEY_WPS_BUTTON>;
        		};
        	};
        
        	gpio-leds {
        		compatible = "gpio-leds";
        
        		red_status: red_status {
        			function = LED_FUNCTION_STATUS;
        			color = <LED_COLOR_ID_RED>;
        			gpios = <&gpio 37 GPIO_ACTIVE_LOW>;
        		};
        
        		white_status: white_status {
        			function = LED_FUNCTION_STATUS;
        			color = <LED_COLOR_ID_WHITE>;
        			gpios = <&gpio 44 GPIO_ACTIVE_LOW>;
        		};
        
        		signal1 {
        			label = "white:signal1";
        			color = <LED_COLOR_ID_WHITE>;
        			gpios = <&gpio 11 GPIO_ACTIVE_LOW>;
        		};
        
        		signal2 {
        			label = "white:signal2";
        			color = <LED_COLOR_ID_WHITE>;
        			gpios = <&gpio 4 GPIO_ACTIVE_LOW>;
        		};
        
        		signal3 {
        			label = "white:signal3";
        			color = <LED_COLOR_ID_WHITE>;
        			gpios = <&gpio 0 GPIO_ACTIVE_LOW>;
        		};
        	};
        
        	gpio_export {
        		compatible = "gpio-export";
        
        		usb4g {
        			gpio-export,name = "4g";
        			gpio-export,output = <0>;
        			gpios = <&gpio 3 GPIO_ACTIVE_HIGH>;
        		};
        	};
        };
        
        &spi0 {
        	status = "okay";
        
        	flash@0 {
        		compatible = "jedec,spi-nor";
        		reg = <0>;
        		spi-max-frequency = <40000000>;
        
        		partitions {
        			compatible = "fixed-partitions";
        			#address-cells = <1>;
        			#size-cells = <1>;
        
        			partition@0 {
        				label = "u-boot";
        				reg = <0x0 0x30000>;
        				read-only;
        			};
        
        			partition@30000 {
        				label = "u-boot-env";
        				reg = <0x30000 0x10000>;
        				read-only;
        			};
        
        			partition@40000 {
        				label = "factory";
        				reg = <0x40000 0x10000>;
        				read-only;
        
        				nvmem-layout {
        					compatible = "fixed-layout";
        					#address-cells = <1>;
        					#size-cells = <1>;
        
        					eeprom_factory_0: eeprom@0 {
        						reg = <0x0 0x400>;
        					};
        				};
        			};
        
        			partition@50000 {
        				compatible = "denx,uimage";
        				label = "firmware";
        				reg = <0x50000 0xf80000>;
        			};
        
        			partition@fd0000 {
        				label = "debug";
        				reg = <0xfd0000 0x10000>;
        				read-only;
        			};
        
        			partition@fe0000 {
        				label = "backup";
        				reg = <0xfe0000 0x10000>;
        				read-only;
        			};
        
        			partition@ff0000 {
        				label = "bdinfo";
        				reg = <0xff0000 0x10000>;
        				read-only;
        				
        				#address-cells = <1>;
        				#size-cells = <1>;
        				compatible = "fixed-partitions";
        
        				nvmem-layout {
        					compatible = "fixed-layout";
        					#address-cells = <1>;
        					#size-cells = <1>;
        
        					macaddr_bdinfo_de00: macaddr@de00 {
        						compatible = "mac-base";
        						reg = <0xde00 0x6>;
        						#nvmem-cell-cells = <1>;
        					};
        				};
        			};
        		};
        	};
        };
        
        &state_default {
        	gpio {
        		groups = "i2s", "i2c", "gpio", "refclk", "wdt", "wled_an";
        		function = "gpio";
        	};
        };
        
        &wmac {
        	status = "okay";
        
        	nvmem-cells = <&eeprom_factory_0>, <&macaddr_bdinfo_de00 2>;
        	nvmem-cell-names = "eeprom", "mac-address";
        };
        
        &ethernet {
        	nvmem-cells = <&macaddr_bdinfo_de00 0>;
        	nvmem-cell-names = "mac-address";
        };
        
        &esw {
        	mediatek,portmap = <0x3e>;
        	mediatek,portdisable = <0x3c>;
        };
        EOF

        # Модифицируем mt76x8.mk под параметры Cudy через Python
        python3 -c "
        path = 'target/linux/ramips/image/mt76x8.mk'
        with open(path, 'r') as f:
            content = f.read()
        start = content.find('define Device/alfa-network_awusfree1')
        end = content.find('endef\nTARGET_DEVICES += alfa-network_awusfree1') + len('endef\nTARGET_DEVICES += alfa-network_awusfree1')
        if start != -1 and end != -1:
            new_block = '''define Device/alfa-network_awusfree1
          \$(Device/cc7628an)
          IMAGE_SIZE := 15872k
          DEVICE_VENDOR := Cudy
          DEVICE_MODEL := LT300
          DEVICE_VARIANT := v3
          SUPPORTED_DEVICES := cudy,lt300-v3
        endef
        TARGET_DEVICES += alfa-network_awusfree1'''
            content = content[:start] + new_block + content[end:]
            with open(path, 'w') as f:
                f.write(content)
        "

        # Отключаем удаление файлов при ложной проверке 'too big > 0'
        sed -i 's/rm -f \$@/@echo "Пул лимита проигнорирован"/g' include/image.mk


    - name: Load custom feeds
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Target Config
      run: |
        cd openwrt
        
        # --- ХАК ДЛЯ ФИКСАЦИИ ОФИЦИАЛЬНОГО VERMAGIC ---
        # Заменяем динамический хэш ядра в скриптах OpenWrt на стоковый хэш релиза 23.05.6
        echo "9606d1ef8f17bc16ff728956bb201f11" > .vermagic
        sed -i 's/$(STAMP_KERNEL_MODIFY)/9606d1ef8f17bc16ff728956bb201f11/g' include/kernel-defaults.mk
        sed -i 's/LINUX_VERMAGIC:=.*/LINUX_VERMAGIC:=9606d1ef8f17bc16ff728956bb201f11/g' include/kernel.mk
        # ----------------------------------------------

        echo 'CONFIG_TARGET_ramips=y' > .config
        echo 'CONFIG_TARGET_ramips_mt76x8=y' >> .config
        echo 'CONFIG_TARGET_ramips_mt76x8_DEVICE_alfa-network_awusfree1=y' >> .config
        echo 'CONFIG_TARGET_MULTI_PROFILE=n' >> .config
        
        # Драйверы сетевой карты и USB для модема MeigLink
        echo 'CONFIG_PACKAGE_luci=y' >> .config
        echo 'CONFIG_PACKAGE_kmod-usb2=y' >> .config
        echo 'CONFIG_PACKAGE_kmod-usb-ohci=y' >> .config
        echo 'CONFIG_PACKAGE_kmod-usb-net-rndis=y' >> .config
        echo 'CONFIG_PACKAGE_kmod-usb-serial-option=y' >> .config
        echo 'CONFIG_PACKAGE_usb-modeswitch=y' >> .config

    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_23.05.6_Cudy_LT300v3_HardPatched
        path: openwrt/bin/targets/ramips/mt76x8/*
