name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Inject Custom Profile Settings
      run: |
        cd imagebuilder
        
        # 1. Извлекаем чистый DTS файл из вашего патча
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts

        # 2. Принудительно заменяем DTS файл дефолтной платы "Generic" на ваш DTS от Cudy LT300 v3.
        # Это заставит Image Builder собрать прошивку по вашей схеме, используя профиль Generic.
        cp target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts target/linux/ramips/dts/mt7628an.dts

        # 3. Инжектируем конфигурацию сети и светодиодов в базовые файлы платформы
        echo -e "\ncudy,lt300-v3)\n\tucidef_set_led_netdev \"internet\" \"internet\" \"white:status\" \"usb0\"\n\t;;\n" >> target/linux/ramips/mt76x8/base-files/etc/board.d/01_leds
        echo -e "\ncudy,lt300-v3)\n\t\tucidef_add_switch \"switch0\" \"0:wan\" \"1:lan\" \"6@eth0\"\n\t\tucidef_set_interface \"wwan\" device \"usb0\" protocol \"dhcp\"\n\t\tuci add_list firewall.@zone[1].network='wwan'\n\t\tuci add_list firewall.@zone[1].network='wwan6'\n\t\t;;\n" >> target/linux/ramips/mt76x8/base-files/etc/board.d/02_network

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Собираем стандартный Generic профиль чипа mt76x8, который теперь содержит ваш DTS и kmod-модули
        make image PROFILE="Generic" PACKAGES="kmod-usb2 kmod-usb-ohci kmod-usb-net-rndis kmod-usb-serial-option uhttpd uhttpd-mod-ubus luci"

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Official_Vermagic_Firmware
        path: imagebuilder/bin/targets/ramips/mt76x8/*.bin
