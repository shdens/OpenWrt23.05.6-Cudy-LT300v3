name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Hard Rewrite Alfa to Cudy ID
      run: |
        cd imagebuilder
        
        # 1. Извлекаем чистый DTS из вашего патча и жестко перезаписываем им файл Альфы
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts
        cp target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts target/linux/ramips/dts/mt7628an_alfa-network_awusfree1.dts

        # 2. Безопасная перезапись блока метаданных Альфы на параметры Cudy через встроенный Python
        python3 -c "
        path = 'target/linux/ramips/image/mt76x8.mk'
        with open(path, 'r') as f:
            content = f.read()
        
        start_idx = content.find('define Device/alfa-network_awusfree1')
        end_str = 'endef\nTARGET_DEVICES += alfa-network_awusfree1'
        end_idx = content.find(end_str) + len(end_str)
        
        if start_idx != -1 and end_idx != -1:
            cudy_block = '''define Device/alfa-network_awusfree1
          \$(Device/cc7628an)
          IMAGE_SIZE := 15872k
          DEVICE_VENDOR := Cudy
          DEVICE_MODEL := LT300
          DEVICE_VARIANT := v3
          SUPPORTED_DEVICES := cudy,lt300-v3
          DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-net-rndis kmod-usb-serial-option
        endef
        TARGET_DEVICES += alfa-network_awusfree1'''
            new_content = content[:start_idx] + cudy_block + content[end_idx:]
            with open(path, 'w') as f:
                f.write(new_content)
            print('Блок профиля успешно заменен на Cudy')
        else:
            print('Ошибка: блок профиля не найден в mt76x8.mk')
        "

        # 3. Инжектируем конфигурацию сети и светодиодов в скрипты инициализации uci-defaults
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        ucidef_set_led_netdev "internet" "internet" "white:status" "usb0"
        ucidef_add_switch "switch0" "0:wan" "1:lan" "6@eth0"
        ucidef_set_interface "wwan" device "usb0" protocol "dhcp"
        uci add_list firewall.@zone.network='wwan'
        uci add_list firewall.@zone.network='wwan6'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Собираем официальный легальный профиль, метаданные которого мы полностью подменили изнутри
        make image PROFILE="alfa-network_awusfree1" PACKAGES="uhttpd uhttpd-mod-ubus luci" FILES="files"

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_23.05.6_Cudy_LT300v3_FixedID
        path: imagebuilder/bin/targets/ramips/mt76x8/*
