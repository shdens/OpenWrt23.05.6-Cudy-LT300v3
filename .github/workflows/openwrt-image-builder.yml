name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Inject Profile and Registry ID
      run: |
        cd imagebuilder
        
        # 1. Извлекаем чистый DTS из вашего patches/999-fixed2.patch
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts

        # 2. Регистрируем профиль устройства cudy_lt300-v3 в Makefile платформы.
        # Наследование $(Device/cc7628an) задает правильный размер, а SUPPORTED_DEVICES привязывает родной ID.
        sed -i '/define Device\/cudy_tr1200-v1/i \\ndefine Device\/cudy_lt300-v3\n  $(Device\/cc7628an)\n  IMAGE_SIZE := 15872k\n  DEVICE_VENDOR := Cudy\n  DEVICE_MODEL := LT300\n  DEVICE_VARIANT := v3\n  SUPPORTED_DEVICES := cudy,lt300-v3\n  DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-net-rndis kmod-usb-serial-option\nendef\nTARGET_DEVICES += cudy_lt300-v3\n' target/linux/ramips/image/mt76x8.mk

        # 3. Инжектируем конфигурацию сети и светодиодов в скрипты инициализации uci-defaults
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        ucidef_set_led_netdev "internet" "internet" "white:status" "usb0"
        ucidef_add_switch "switch0" "0:wan" "1:lan" "6@eth0"
        ucidef_set_interface "wwan" device "usb0" protocol "dhcp"
        uci add_list firewall.@zone.network='wwan'
        uci add_list firewall.@zone.network='wwan6'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Собираем прошивку напрямую по имени нового зарегистрированного TARGET_DEVICE
        make image TARGET_DEVICES="cudy_lt300-v3" PACKAGES="uhttpd uhttpd-mod-ubus luci" FILES="files"

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_23.05.6_Cudy_LT300v3_Native
        path: imagebuilder/bin/targets/ramips/mt76x8/*
