name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Inject Custom Profile Settings
      run: |
        cd imagebuilder
        
        # 1. Извлекаем чистый DTS из вашего патча и жестко подменяем им DTS файл Альфы
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts
        
        # Перезаписываем DTS альфы вашим кастомным DTS для Cudy
        cp target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts target/linux/ramips/dts/mt7628an_alfa-network_awusfree1.dts

        # 2. Подменяем конфигурацию этого профиля в mt76x8.mk, чтобы изменить имя и добавить пакеты модема
        sed -i '/define Device\/alfa-network_awusfree1/,/endef/c\\define Device\/alfa-network_awusfree1\n  $(Device\/cc7628an)\n  IMAGE_SIZE := 15872k\n  DEVICE_VENDOR := Cudy\n  DEVICE_MODEL := LT300 v3 (Alfa Mod)\n  DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-net-rndis kmod-usb-serial-option\nendef' target/linux/ramips/image/mt76x8.mk

        # 3. Инжектируем конфигурацию сети и светодиодов в скрипты инициализации
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        ucidef_set_led_netdev "internet" "internet" "white:status" "usb0"
        ucidef_add_switch "switch0" "0:wan" "1:lan" "6@eth0"
        ucidef_set_interface "wwan" device "usb0" protocol "dhcp"
        uci add_list firewall.@zone[1].network='wwan'
        uci add_list firewall.@zone[1].network='wwan6'
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Вызываем сборку модифицированного профиля альфы
        make image PROFILE="alfa-network_awusfree1" PACKAGES="uhttpd uhttpd-mod-ubus luci" FILES="files"
