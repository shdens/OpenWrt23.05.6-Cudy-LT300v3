name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Inject Custom Settings via Files
      run: |
        cd imagebuilder
        
        # 1. Извлекаем DTS из вашего патча и подменяем им базовый dts профиля generic
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts
        cp target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts target/linux/ramips/dts/mt7628an.dts

        # 2. Создаем структуру папок для переопределения конфигурации сети роутера
        mkdir -p files/etc/uci-defaults
        
        # 3. Пишем uci-defaults скрипт, который настроит сеть и диоды при первой загрузке роутера
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        
        # Светодиоды
        ucidef_set_led_netdev "internet" "internet" "white:status" "usb0"
        
        # Сеть
        ucidef_add_switch "switch0" "0:wan" "1:lan" "6@eth0"
        ucidef_set_interface "wwan" device "usb0" protocol "dhcp"
        uci add_list firewall.@zone[1].network='wwan'
        uci add_list firewall.@zone[1].network='wwan6'
        
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Собираем официальный профиль generic. Настройки сети и ваш DTS применятся автоматически.
        make image PROFILE="generic" PACKAGES="kmod-usb2 kmod-usb-ohci kmod-usb-net-rndis kmod-usb-serial-option uhttpd uhttpd-mod-ubus luci luci-proto-3g" FILES="files"

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Official_Vermagic_Firmware
        path: imagebuilder/bin/targets/ramips/mt76x8/*.bin
