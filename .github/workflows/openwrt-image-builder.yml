name: OpenWrt Image Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev gawk git texinfo zlib1g-dev patch unzip wget time

    - name: Download Official Image Builder
      run: |
        URL="https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt76x8/openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz"
        echo "Скачиваем Image Builder..."
        wget "$URL"
        echo "Распаковываем архив..."
        ls -l
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.6-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Inject Custom Settings
      run: |
        cd imagebuilder
        
        # 1. Извлекаем DTS из вашего патча
        cp $GITHUB_WORKSPACE/patches/999-fixed2.patch ./
        sed -n '/--- \/dev\/null/,/--- a\/target/p' 999-fixed2.patch | sed '1,2d' | sed '$d' > target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts
        
        # 2. Исправляем баг синтаксиса "Bad cell count" (в 23.05 блоку nvmem-layout требуется nvmem-cells-group)
        sed -i 's/compatible = "fixed-layout";/compatible = "fixed-layout";\n\t\t\t\t\t#address-cells = <1>;\n\t\t\t\t\t#size-cells = <1>;/g' target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts
        
        # 3. Жестко подменяем DTS файл родственного 16MB устройства wr1000
        cp target/linux/ramips/dts/mt7628an_cudy_lt300-v3.dts target/linux/ramips/dts/mt7628an_cudy_wr1000.dts

        # 4. Модифицируем метаданные wr1000, вшивая в ядро имя Cudy LT300 v3 и пакеты сотовой связи
        sed -i 's/DEVICE_MODEL := WR1000/DEVICE_MODEL := LT300 v3 (Modified)/g' target/linux/ramips/image/mt76x8.mk
        sed -i '/Device\/cudy_wr1000/,/endef/ { /DEVICE_PACKAGES :=/c\  DEVICE_PACKAGES := kmod-usb2 kmod-usb-ohci kmod-usb-net-cdc-ether kmod-usb-net-rndis kmod-usb-serial-option usb-modeswitch' target/linux/ramips/image/mt76x8.mk

        # 5. Скрипт uci-defaults для автоматической конфигурации сети при старте
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        echo "Cudy LT300 v3" > /tmp/sysinfo/model
        
        # Инициализация LAN/WAN портов и сотового интерфейса usb0
        ucidef_set_led_netdev "internet" "internet" "white:status" "usb0"
        ucidef_add_switch "switch0" "0:wan" "1:lan" "6@eth0"
        
        uci delete network.wwan 2>/dev/null
        uci set network.wwan=interface
        uci set network.wwan.proto='dhcp'
        uci set network.wwan.device='usb0'
        uci add_list firewall.@zone.network='wwan'
        
        uci commit
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

    - name: Compile with Official Kernel
      run: |
        cd imagebuilder
        # Собираем прошивку на базе профиля cudy_wr1000
        make image PROFILE="cudy_wr1000" PACKAGES="uhttpd uhttpd-mod-ubus luci" FILES="files"

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_23.05.6_Cudy_LT300v3_Fixed_MTD
        path: imagebuilder/bin/targets/ramips/mt76x8/*
